name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1 -timeout 30s -race

      - name: Validate configs
        run: make validate

  build:
    name: Build linux-${{ matrix.arch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute version
        run: echo "VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" >> $GITHUB_ENV

      - name: Build binary
        run: make linux-${{ matrix.arch }}

      - name: Verify static binary
        run: |
          BINARY="dist/gpu-metrics-exporter-linux-${{ matrix.arch }}"
          file "$BINARY"
          file "$BINARY" | grep -q "statically linked" || { echo "::error::Binary is not statically linked (musl/Alpine would break)"; exit 1; }

      - name: Stage release bundle
        run: |
          ARCH=${{ matrix.arch }}
          DIRNAME="gpu-metrics-exporter-${VERSION}-linux-${ARCH}"
          mkdir -p "stage/${DIRNAME}/configs"
          cp "dist/gpu-metrics-exporter-linux-${ARCH}" "stage/${DIRNAME}/gpu-metrics-exporter"
          cp configs/*.example.yaml "stage/${DIRNAME}/configs/"
          cp README.md gpu-metrics-exporter.service "stage/${DIRNAME}/"
          tar -czf "${DIRNAME}.tar.gz" -C stage "${DIRNAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-metrics-exporter-linux-${{ matrix.arch }}
          path: gpu-metrics-exporter-*-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false